[phases.setup]
nixPkgs = ["nodejs_18", "pnpm-9_x", "openssl"]

[phases.install]
cmds = ["pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = ["BASE_PATH=/ pnpm --filter @workspace/study-app run build", "pnpm --filter @workspace/api-server run build"]

[start]
cmd = "pnpm --filter @workspace/db run push && node artifacts/api-server/dist/index.mjs"
